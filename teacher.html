<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ملف الأستاذ | أستاذي</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar container"><div class="logo">🎓 أستاذي</div></header>
  <div class="container" id="profile" style="padding:30px 0"></div>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const snap = await getDoc(doc(db, "professors", id));
    if (!snap.exists()) { document.getElementById('profile').innerHTML = '<h3>غير موجود</h3>'; } else {
      const d = snap.data();
      document.getElementById('profile').innerHTML = `<div class="card" style="max-width:500px;margin:auto;text-align:center"><div class="card-img">👨‍🏫</div><div class="card-body"><h2>${d.name}</h2><p>${d.wilaya}</p><p class="subject">${(d.subjects||[]).join(', ')}</p><p class="price">${d.price} دج/حصة</p><button class="btn" onclick="book()">احجز حصة</button></div></div>`;
    }
    window.book = () => alert('تم إرسال طلب الحجز. سنتواصل معك.');
  </script>
</body>
</html>
