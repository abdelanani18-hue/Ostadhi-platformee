<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>بحث | أستاذي</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar container"><div class="logo">🎓 أستاذي</div></header>
  <div class="container" style="padding:30px 0">
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
      <input type="text" id="fSubject" placeholder="المادة">
      <input type="text" id="fWilaya" placeholder="الولاية">
      <button class="btn" onclick="search()">بحث</button>
    </div>
    <div class="cards" id="results"></div>
  </div>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    window.search = async () => {
      const snap = await getDocs(collection(db, "professors"));
      const grid = document.getElementById('results');
      grid.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        grid.innerHTML += `<div class="card"><div class="card-img">👨‍🏫</div><div class="card-body"><h3>${d.name}</h3><div class="subject">${(d.subjects||[]).join(',')}</div><div class="price">${d.price} دج</div><a href="teacher.html?id=${doc.id}" class="btn-sm">عرض</a></div></div>`;
      });
    };
    search();
  </script>
</body>
</html>
